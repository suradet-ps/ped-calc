# Trunk.toml — WASM bundler configuration
# https://trunkrs.dev/configuration/

[build]
target = "index.html"
dist = "dist"
public_url = "/"

[watch]
watch = ["src", "index.html"]
ignore = ["dist", "target"]

[serve]
address = "127.0.0.1"
port = 8080
open = false

[tools]
wasm-bindgen = "0.2"
wasm-opt = true
